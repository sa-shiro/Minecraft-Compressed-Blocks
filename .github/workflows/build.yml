#file: noinspection SpellCheckingInspection

run-name: "v1.3.5 - 1.19.4"

name: build
on: push

env:
  VERSION: 1.3.5
  MC_VERSION: "1.19.4"
  MC_VERSION_RANGE: |
    1.19.3
    1.19.4
  VERSION_TYPE: release
  CURSEFORGE_ID: 361354
  MODRINTH_ID: "IQRVlbit"

jobs:
  build:
    strategy:
      matrix:
        # Use these Java versions
        java: [ 17 ] # Current Java LTS & minimum supported by Minecraft
        os: [ ubuntu-latest, windows-latest ]  # and run on both Linux and Windows
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: validate gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: setup jdk ${{ matrix.java }}
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: make gradle wrapper executable
        if: ${{ runner.os != 'Windows' }}
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      - name: capture build artifacts
        if: ${{ runner.os == 'Linux' && matrix.java == '17' }} # Only upload artifacts built from the latest java on one OS
        uses: actions/upload-artifact@v3
        with:
          name: Artifacts
          path: |
            forge/build/libs/
            fabric/build/libs/